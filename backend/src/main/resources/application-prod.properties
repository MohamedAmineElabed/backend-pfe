# ===== DATABASE (Railway MySQL plugin injects these) =====
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/projet_pfe?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ===== BREVO (formerly Sendinblue) =====
brevo.api.key=${BREVO_API_KEY}

# ===== SECURITY =====
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:28800000}

# ===== CLOUDINARY =====
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ===== ANTHROPIC =====
anthropic.api.key=${ANTHROPIC_API_KEY}

# ===== SERVER =====
server.port=${PORT:8080}
server.error.include-message=always

# ===== FILE UPLOADS =====
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ===== BASE URL (set to your Railway public URL after first deploy) =====
app.base-url=${APP_BASE_URL:}